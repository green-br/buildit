packages:
  gcc:
    externals:
    - spec: gcc@11.5.0 languages:='c,c++,fortran'
      prefix: /usr
      extra_attributes:
        compilers:
          c: /usr/bin/gcc
          cxx: /usr/bin/g++
          fortran: /usr/bin/gfortran
  autoconf:
    externals:
    - spec: autoconf@2.69
      prefix: /usr
  perl:
    externals:
    - spec: perl@5.32.1~cpanm+opcode+open+shared+threads
      prefix: /usr
  gettext:
